version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: adcp-postgres
    environment:
      POSTGRES_DB: adcp
      POSTGRES_USER: adcp_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adcp_user -d adcp"]
      interval: 10s
      timeout: 5s
      retries: 5

  adcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adcp-server
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://adcp_user:dev_password@postgres:5432/adcp
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
